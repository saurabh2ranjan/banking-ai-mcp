spring:
  application:
    name: banking-ai-gateway

  datasource:
    url: jdbc:h2:mem:bankingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: BankingHikariPool

  h2:
    console:
      enabled: false   # enabled only in dev profile

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        preferred_uuid_jdbc_type: varchar  # Hibernate 7 default is BINARY(16); use VARCHAR for String UUID fields
        # Hibernate's Jackson-based JSON type handling to prevent Dialect.java crash
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.1
          max-tokens: 2048

    mcp:
      server:
        enabled: true    # activates McpServerSseWebMvcAutoConfiguration
        name: banking-mcp-server
        version: 1.0.0
        type: SYNC       # API style: SYNC (blocking) vs ASYNC (reactive)
        protocol: SSE    # transport: SSE enables /mcp/sse endpoint
        capabilities:
          tool: true


server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
  compression:
    enabled: true

banking:
  kafka:
    enabled: ${BANKING_KAFKA_ENABLED:false}   # activate via 'kafka' profile or env var
  security:
    api-key: ${BANKING_API_KEY:banking-demo-key-2024}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.banking: DEBUG
    org.springframework.ai: INFO
    org.springframework.security: WARN
    #org.springframework.boot.autoconfigure.h2: DEBUG
    #org.springframework.boot.autoconfigure.condition: DEBUG
    org.hibernate.SQL: WARN
  # pattern managed by logback-spring.xml (profile-conditional: colored console / JSON)

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        preferred_uuid_jdbc_type: varchar
  ai:
    openai:
      api-key: test-key-not-used
    mcp:
      server:
        name: banking-mcp-server
        version: 1.0.0
        type: SYNC
        capabilities:
          tool: true
  autoconfigure:
    exclude:
      # Exclude OpenAI — no real key in tests. BankingAiConfig skips its beans via
      # @ConditionalOnBean(ChatModel.class); nested AiTestConfig provides mock beans.
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.chat.client.ChatClientAutoConfiguration
      # Exclude Kafka — spring-boot-kafka is on the classpath unconditionally, so
      # KafkaAutoConfiguration fires regardless of banking.kafka.enabled.
      # This prevents ProducerFactory/KafkaTemplate creation and the resulting
      # connection attempts to localhost:9092 on every test run.
      - org.springframework.boot.kafka.autoconfigure.KafkaAutoConfiguration
      # Exclude OTel — prevents OTLP exporter from attempting connections
      # to localhost:4318 during tests.
      - org.springframework.boot.micrometer.tracing.opentelemetry.autoconfigure.OpenTelemetryTracingAutoConfiguration
      - org.springframework.boot.micrometer.tracing.opentelemetry.autoconfigure.otlp.OtlpTracingAutoConfiguration
      - org.springframework.boot.opentelemetry.autoconfigure.OpenTelemetrySdkAutoConfiguration
      - org.springframework.boot.micrometer.metrics.autoconfigure.export.otlp.OtlpMetricsExportAutoConfiguration

management:
  tracing:
    enabled: false   # prevent OTel tracing in tests

banking:
  kafka:
    enabled: false   # never activate Kafka in tests regardless of env vars
  security:
    api-key: test-api-key

server:
  error:
    include-message: never        # match production error behavior in test assertions
    include-stacktrace: never

logging:
  # pattern managed by logback-spring.xml
  level:
    com.banking: INFO
    org.springframework.ai: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

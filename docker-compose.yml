version: '3.9'

services:

  # ── PostgreSQL (replace H2 in production) ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    environment:
      POSTGRES_DB: bankingdb
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d bankingdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (session + cache) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: banking-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_secret
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zipkin (distributed tracing) ─────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3
    container_name: banking-zipkin
    ports:
      - "9411:9411"

  # ── Banking AI Gateway ────────────────────────────────────────────────────────
  banking-ai-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banking-ai-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bankingdb
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking_secret
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: redis_secret
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BANKING_API_KEY: ${BANKING_API_KEY:-banking-demo-key-2024}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'banking-ai-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['banking-ai-gateway:8080']

  - job_name: 'banking-mcp-client'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['banking-mcp-client:8081']

spring:
  application:
    name: banking-mcp-client

  ai:
    mcp:
      client:
        # Each entry creates one McpSyncClient bean.
        # The gateway runs a SYNC/WebMVC MCP server — SSE at /sse, messages at /mcp/message.
        connections:
          banking-server:
            url: http://localhost:8080   # banking-ai-gateway base URL

server:
  port: 8081   # different port so both apps can run together

banking:
  kafka:
    enabled: ${BANKING_KAFKA_ENABLED:false}   # activate via 'kafka' profile or env var
  compliance:
    kyc-check-enabled: false   # opt-in only — enable explicitly in the environment that needs scheduling

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  # pattern managed by logback-spring.xml
  level:
    com.banking: INFO
    org.springframework.ai: INFO
    org.springframework.security: WARN
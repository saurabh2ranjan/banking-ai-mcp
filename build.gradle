plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.3' apply false
}

ext {
    springBootVersion = '4.0.3'
    springAiVersion   = '2.0.0-M2'
    lombokVersion     = '1.18.36'
    mapstructVersion  = '1.6.3'
    testcontainersVer = '1.21.0'
}

subprojects {
    apply plugin: 'java'

    group   = 'com.banking'
    version = '1.0.0-SNAPSHOT'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    // Apply BOMs to EVERY configuration (compileClasspath, runtimeClasspath, testCompileClasspath, etc.)
    // This runs before any subproject dependencies{} block is evaluated.
    afterEvaluate {
        configurations.all {
            incoming.beforeResolve {
                // no-op — actual constraints added via dependencies block below
            }
        }
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
        jvmArgs '-XX:+EnableDynamicAgentLoading'
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.compilerArgs += [
            '-Amapstruct.defaultComponentModel=spring',
            '-parameters'
        ]
    }
}

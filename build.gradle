plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.3' apply false
}

ext {
    springBootVersion  = '4.0.3'
    springAiVersion    = '2.0.0-M2'
    lombokVersion      = '1.18.36'
    mapstructVersion   = '1.6.3'
    testcontainersVer  = '1.21.0'
}

allprojects {
    group   = 'com.banking'
    version = '1.0.0-SNAPSHOT'

    repositories {
        mavenCentral()
        maven { url 'https://repo.spring.io/milestone' }
        maven { url 'https://repo.spring.io/snapshot' }
    }
}

subprojects {
    apply plugin: 'java'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    dependencies {
        // BOMs — native Gradle platform() replaces io.spring.dependency-management plugin
        // enforcedPlatform() overrides any conflicting transitive versions, matching Spring Boot plugin behaviour
        implementation enforcedPlatform("org.springframework.boot:spring-boot-dependencies:${springBootVersion}")
        implementation enforcedPlatform("org.springframework.ai:spring-ai-bom:${springAiVersion}")
        implementation enforcedPlatform("org.testcontainers:testcontainers-bom:${testcontainersVer}")

        // Lombok
        compileOnly         "org.projectlombok:lombok:${lombokVersion}"
        annotationProcessor "org.projectlombok:lombok:${lombokVersion}"
        testCompileOnly     "org.projectlombok:lombok:${lombokVersion}"
        testAnnotationProcessor "org.projectlombok:lombok:${lombokVersion}"

        // MapStruct
        implementation      "org.mapstruct:mapstruct:${mapstructVersion}"
        annotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"
        // Lombok + MapStruct ordering fix
        annotationProcessor 'org.projectlombok:lombok-mapstruct-binding:0.2.0'

        // Test
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testImplementation 'org.assertj:assertj-core'
        testImplementation 'org.mockito:mockito-core'
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
        jvmArgs '-XX:+EnableDynamicAgentLoading'
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.compilerArgs += [
            '-Amapstruct.defaultComponentModel=spring',
            '-parameters'
        ]
    }
}

plugins {
    id 'java'
    id 'org.springframework.boot'            version '4.0.3' apply false
    id 'io.spring.dependency-management'     version '1.1.7' apply false
}

ext {
    springBootVersion = '4.0.3'
    springAiVersion   = '2.0.0-M2'
    lombokVersion     = '1.18.42'
    mapstructVersion  = '1.6.3'
    testcontainersVer = '1.21.0'
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'io.spring.dependency-management'

    group   = 'com.banking'
    version = '1.0.0-SNAPSHOT'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    // dependency-management plugin hooks in before dependency resolution —
    // this is the correct way to apply BOMs in Gradle 9 multi-project builds
    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
            mavenBom "org.springframework.ai:spring-ai-bom:${springAiVersion}"
            mavenBom "org.testcontainers:testcontainers-bom:${testcontainersVer}"
        }
    }

    dependencies {
        // Lombok
        compileOnly             "org.projectlombok:lombok:${lombokVersion}"
        annotationProcessor     "org.projectlombok:lombok:${lombokVersion}"
        testCompileOnly         "org.projectlombok:lombok:${lombokVersion}"
        testAnnotationProcessor "org.projectlombok:lombok:${lombokVersion}"

        // MapStruct
        implementation          "org.mapstruct:mapstruct:${mapstructVersion}"
        annotationProcessor     "org.mapstruct:mapstruct-processor:${mapstructVersion}"
        annotationProcessor      'org.projectlombok:lombok-mapstruct-binding:0.2.0'

        // Test
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testImplementation 'org.assertj:assertj-core'
        testImplementation 'org.mockito:mockito-core'
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
        jvmArgs '-XX:+EnableDynamicAgentLoading'
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.compilerArgs += [
            '-Amapstruct.defaultComponentModel=spring',
            '-parameters'
        ]
    }
}

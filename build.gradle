plugins {
    id 'java'
    id 'jacoco'
    id 'org.springframework.boot'            version '4.0.3' apply false
    id 'io.spring.dependency-management'     version '1.1.7' apply false
}

ext {
    springBootVersion = '4.0.3'
    springAiVersion   = '2.0.0-M2'
    lombokVersion     = '1.18.42'
    mapstructVersion  = '1.6.3'
    testcontainersVer = '1.21.0'
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'jacoco'
    apply plugin: 'io.spring.dependency-management'

    group   = 'com.banking'
    version = '1.0.0-SNAPSHOT'

    jacoco {
        toolVersion = "0.8.14"
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    // dependency-management plugin hooks in before dependency resolution —
    // this is the correct way to apply BOMs in Gradle 9 multi-project builds
    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
            mavenBom "org.springframework.ai:spring-ai-bom:${springAiVersion}"
            mavenBom "org.testcontainers:testcontainers-bom:${testcontainersVer}"
        }
    }

    dependencies {
        // Lombok
        compileOnly             "org.projectlombok:lombok:${lombokVersion}"
        annotationProcessor     "org.projectlombok:lombok:${lombokVersion}"
        testCompileOnly         "org.projectlombok:lombok:${lombokVersion}"
        testAnnotationProcessor "org.projectlombok:lombok:${lombokVersion}"

        // MapStruct
        implementation          "org.mapstruct:mapstruct:${mapstructVersion}"
        annotationProcessor     "org.mapstruct:mapstruct-processor:${mapstructVersion}"
        annotationProcessor      'org.projectlombok:lombok-mapstruct-binding:0.2.0'

        // Test
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testImplementation 'org.assertj:assertj-core'
        testImplementation 'org.mockito:mockito-core'

        // Gradle 9 requires junit-platform-launcher explicitly on the test runtime classpath.
        // spring-boot-starter-test pulls in junit-jupiter but NOT the launcher —
        // without this Gradle's test executor cannot start.
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
        jvmArgs '-XX:+EnableDynamicAgentLoading'
        jvmArgs '--enable-native-access=ALL-UNNAMED' // ← added for Java 25 + JaCoCo
        finalizedBy jacocoTestReport
    }

    jacocoTestReport {
        dependsOn test
        reports {
            html.required = true
            xml.required  = true
            csv.required  = false
        }
        // exclude classes that don't need coverage measurement
        afterEvaluate {
            classDirectories.setFrom(files(classDirectories.files.collect {
                fileTree(dir: it, exclude: [
                        '**/domain/**',
                        '**/dto/**',
                        '**/config/**',
                        '**/*Application*',
                        '**/exception/**'
                ])
            }))
        }
    }

    jacocoTestCoverageVerification {                     // ← ADD HERE
        violationRules {
            rule {
                limit {
                    minimum = 0.70  // 70% minimum — adjust as needed
                }
            }
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.compilerArgs += [
            '-Amapstruct.defaultComponentModel=spring',
            '-parameters'
        ]
    }
}

tasks.register('jacocoRootReport', JacocoReport) {
    dependsOn subprojects.collect { it.tasks.withType(Test) }

    additionalSourceDirs.setFrom(subprojects.collect { it.sourceSets.main.allSource.srcDirs })
    sourceDirectories.setFrom(subprojects.collect { it.sourceSets.main.allSource.srcDirs })
    classDirectories.setFrom(subprojects.collect { it.sourceSets.main.output })
    executionData.setFrom(subprojects.collect { it.tasks.withType(Test) }
            .flatten()
            .findAll { it.jacoco.destinationFile.exists() }
            .collect { it.jacoco.destinationFile })

    reports {
        html.required = true
        html.outputLocation = file("${rootProject.buildDir}/reports/jacoco/root/html")
        xml.required  = true
        xml.outputLocation = file("${rootProject.buildDir}/reports/jacoco/root/jacocoRootReport.xml")
    }
}